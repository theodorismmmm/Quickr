name: Build AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            python3 \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-3.0 \
            libgtk-3-0 \
            libgdk-pixbuf2.0-0 \
            librsvg2-common \
            xdg-utils \
            fuse \
            libfuse2

      - name: Download appimagetool
        run: |
          wget -q \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Build AppImage
        run: |
          # Allow appimagetool to run without FUSE by using --appimage-extract-and-run
          APPIMAGETOOL="./appimagetool-x86_64.AppImage --appimage-extract-and-run" \
            bash build-appimage.sh

      - name: Rename artifact with version tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv Quickr.AppImage "Quickr-${VERSION}-x86_64.AppImage"
          echo "ARTIFACT_NAME=Quickr-${VERSION}-x86_64.AppImage" >> "$GITHUB_ENV"

      - name: Upload AppImage as release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_NAME }}

      - name: Upload AppImage as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 30
