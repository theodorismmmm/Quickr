name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Build Windows executable
        shell: powershell
        run: |
          pyinstaller --noconfirm --clean --onefile --name Quickr quickr.py --paths src --exclude-module gi
          $version = (Get-Content VERSION).Trim()
          if (-not $version) { throw "VERSION file is empty" }
          $artifactName = "Quickr-$version-windows-x86_64.exe"
          Move-Item "dist/Quickr.exe" $artifactName
          "ARTIFACT_NAME=$artifactName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload EXE as release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_NAME }}

      - name: Upload EXE as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 30
